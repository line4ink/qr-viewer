<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم السرية</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #cbd5e1;
        }

        body { 
            background: var(--bg-gradient); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* اللوحة مخفية تماماً في البداية للأمان حتى كتابة الباسورد */
        .admin-panel { 
            display: none;
            width: 100%;
            max-width: 450px; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08); 
            text-align: center; 
            direction: rtl;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
            margin: 20px;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            width: 72px;
            height: 72px;
            background: #eeeaff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        h2 { 
            color: var(--text-main); 
            margin: 0 0 12px 0; 
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p { 
            color: var(--text-muted); 
            font-size: 15px; 
            line-height: 1.6;
            margin: 0 0 30px 0;
        }

        select { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: 2px solid var(--border); 
            border-radius: 14px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #fff; 
            color: var(--text-main);
            cursor: pointer; 
            transition: all 0.25s ease;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: left 16px center;
            background-size: 18px;
            font-weight: 500;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px 25px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 14px; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.25s ease; 
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        button:hover { 
            background: var(--primary-hover); 
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box { 
            margin-top: 35px; 
            padding-top: 30px; 
            border-top: 2px dashed #e2e8f0; 
        }

        .result-box strong {
            display: block;
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 10px;
            text-align: right;
        }

        .url-text { 
            background: #f8fafc; 
            padding: 14px; 
            border-radius: 10px; 
            font-size: 13px; 
            word-break: break-all; 
            display: block; 
            margin-bottom: 25px; 
            text-align: left; 
            direction: ltr; 
            color: #334155;
            border: 1px solid #e2e8f0;
            font-family: monospace;
        }

        .qr-img { 
            width: 210px; 
            height: 210px; 
            margin-top: 10px; 
            border: 1px solid #e2e8f0; 
            padding: 14px; 
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        #loading, #error-msg { 
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        #loading { 
            color: #b45309; 
            background: #fef3c7;
            border: 1px solid #fde68a;
        }

        #error-msg {
            color: #b91c1c;
            background: #fee2e2;
            border: 1px solid #fecaca;
            display: none;
            line-height: 1.5;
        }

        small {
            color: #64748b;
            display: block;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="admin-panel" id="panel">
        <div class="icon-wrapper">✨</div>
        <h2>لوحة التحكم الذكية</h2>
        <p>اختر الملف المرفوع مباشرة لتوليد الرابط والباركود الخاص به بنقرة واحدة.</p>
        
        <div id="loading">جاري جلب ملفاتك الحالية من جيت هاب...</div>
        <div id="error-msg"></div>
        
        <select id="fileSelect" style="display:none;"></select>
        <button id="genBtn" onclick="generateQRAndLink()" style="display:none;">توليد الرابط والباركود</button>
        
        <div id="resultBox" class="result-box" style="display:none;">
            <strong>الرابط المباشر للملف:</strong>
            <span id="generatedUrl" class="url-text"></span>
            
            <strong>كود الـ QR جاهز:</strong><br>
            <img id="qrCodeImg" class="qr-img" src="" alt="QR Code"><br>
            <small>💡 اضغط كليك يمين على الباركود واختار (Save image as) لحفظه</small>
        </div>
    </div>

    <script>
        const password = prompt("من فضلك أدخل كلمة المرور للدخول للوحة التحكم:");
        if (password === "Mohamed@9498#") {
            // إظهار اللوحة فقط إذا كانت كلمة السر صحيحة
            document.getElementById('panel').style.display = 'block';
            loadFilesFromGitHub(); 
        } else {
            alert("كلمة مرور خاطئة!");
            window.location.href = "index.html"; 
        }

        async function loadFilesFromGitHub() {
            try {
                // تعديل اسم الحساب الصحيح هنا بناءً على ملفاتك الرسمية
                const username = "line4ink"; 
                const repoName = "qr-viewer"; 

                const apiUrl = `https://api.github.com/repos/${username}/${repoName}/contents/images`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('تعذر العثور على المستودع أو الفولدر. تأكد من رفع ملفات داخل فولدر images.');
                
                const files = await response.json();
                const select = document.getElementById('fileSelect');
                
                select.innerHTML = '<option value="">-- اختر الملف من القائمة --</option>';
                
                let fileCount = 0;
                files.forEach(file => {
                    if (file.type === 'file') {
                        const option = document.createElement('option');
                        option.value = file.name;
                        option.text = file.name;
                        select.appendChild(option);
                        fileCount++;
                    }
                });

                if(fileCount === 0) {
                    throw new Error('فولدر images فارغ تماماً على جيت هاب! ارفع فيه ملفات أولاً.');
                }
                
                document.getElementById('loading').style.display = 'none';
                select.style.display = 'block';
                document.getElementById('genBtn').style.display = 'block';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error-msg');
                errorDiv.innerText = `⚠️ خطأ: ${error.message}`;
                errorDiv.style.display = 'block';
            }
        }

        function generateQRAndLink() {
            const select = document.getElementById('fileSelect');
            const selectedFile = select.value;
            
            if (!selectedFile) {
                alert('من فضلك اختر ملفاً أولاً!');
                return;
            }
            
            const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
            const finalFileUrl = `${baseUrl}?file=${selectedFile}`;
            
            document.getElementById('generatedUrl').innerText = finalFileUrl;
            
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(finalFileUrl)}`;
            document.getElementById('qrCodeImg').src = qrApiUrl;
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
