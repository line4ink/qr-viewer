<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم السرية</title>
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; display: none; /* مخفي حتى كتابة الباسورد */ }
        .admin-panel { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; direction: rtl; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; text-align: left; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; }
        .result-box { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ecf0f1; display: none; }
        .qr-img { width: 200px; height: 200px; margin-top: 15px; }
        .url-text { background: #efefef; padding: 10px; border-radius: 5px; font-size: 13px; word-break: break-all; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>لوحة توليد الباركود السرية 🔒</h2>
        <input type="text" id="fileNameInput" placeholder="اكتب اسم الملف هنا مثل: 4.JPG">
        <button onclick="generateQRAndLink()">توليد الرابط والباركود</button>
        
        <div id="resultBox" class="result-box">
            <strong>الرابط المباشر للملف:</strong>
            <span id="generatedUrl" class="url-text"></span>
            <strong>كود الـ QR جاهز:</strong><br>
            <img id="qrCodeImg" class="qr-img" src="" alt="QR Code">
        </div>
    </div>

    <script>
        // تم تحديث كلمة السر هنا بناءً على طلبك
        const password = prompt("من فضلك أدخل كلمة المرور للدخول للوحة التحكم:");
        if (password === "Mohamed@9498#") {
            document.body.style.display = "block"; // إظهار الصفحة لو الباسورد صح
        } else {
            alert("كلمة مرور خاطئة!");
            window.location.href = "index.html"; // طرده لصفحة العرض العامة
        }

        function generateQRAndLink() {
            const inputVal = document.getElementById('fileNameInput').value.trim();
            if (!inputVal) return alert('اكتب اسم الملف!');
            
            // بيعمل الرابط أوتوماتيك ويوجهه لملف الـ index.html العام
            const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
            const finalFileUrl = `${baseUrl}?file=${inputVal}`;
            
            document.getElementById('generatedUrl').innerText = finalFileUrl;
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(finalFileUrl)}`;
            document.getElementById('qrCodeImg').src = qrApiUrl;
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
