<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم السرية</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body { 
            background-color: var(--background); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            display: none; 
            margin: 0; 
            padding: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .admin-panel { 
            width: 100%;
            max-width: 440px; 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.06); 
            text-align: center; 
            direction: rtl;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-sizing: border-box;
            margin: 20px;
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: #eef2ff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }

        h2 { 
            color: var(--text-main); 
            margin: 0 0 10px 0; 
            font-size: 24px;
            font-weight: 700;
        }

        p { 
            color: var(--text-muted); 
            font-size: 14px; 
            line-height: 1.6;
            margin: 0 0 25px 0;
        }

        select { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 16px; 
            border: 1.5px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #fff; 
            color: var(--text-main);
            cursor: pointer; 
            transition: all 0.2s;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: left 16px center;
            background-size: 16px;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px 25px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        button:hover { 
            background-color: var(--primary-hover); 
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.25);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box { 
            margin-top: 30px; 
            padding-top: 25px; 
            border-top: 1.5px dashed var(--border); 
            display: none; 
        }

        .result-box strong {
            display: block;
            color: var(--text-main);
            font-size: 14px;
            margin-bottom: 8px;
            text-align: right;
        }

        .url-text { 
            background: #f1f5f9; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 13px; 
            word-break: break-all; 
            display: block; 
            margin-bottom: 20px; 
            text-align: left; 
            direction: ltr; 
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .qr-img { 
            width: 200px; 
            height: 200px; 
            margin-top: 10px; 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 16px;
            background: #fff;
        }

        #loading, #error-msg { 
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        #loading { 
            color: #d97706; 
            background: #fef3c7;
        }

        #error-msg {
            color: #dc2626;
            background: #fee2e2;
            display: none;
            line-height: 1.5;
        }

        small {
            color: var(--text-muted);
            display: block;
            margin-top: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="icon-wrapper">🔒</div>
        <h2>لوحة التحكم السرية</h2>
        <p>اختر الملف المرفوع مباشرة لتوليد الرابط والباركود الخاص به بنقرة واحدة.</p>
        
        <div id="loading">جاري جلب الملفات من GitHub...</div>
        <div id="error-msg"></div>
        
        <select id="fileSelect" style="display:none;"></select>
        <button id="genBtn" onclick="generateQRAndLink()" style="display:none;">توليد الرابط والباركود</button>
        
        <div id="resultBox" class="result-box">
            <strong>الرابط المباشر للملف:</strong>
            <span id="generatedUrl" class="url-text"></span>
            
            <strong>كود الـ QR جاهز:</strong><br>
            <img id="qrCodeImg" class="qr-img" src="" alt="QR Code"><br>
            <small>كليك يمين على الباركود واختار (Save image as) لحفظه</small>
        </div>
    </div>

    <script>
        // التحقق من كلمة السر الخاصة بك
        const password = prompt("من فضلك أدخل كلمة المرور للدخول للوحة التحكم:");
        if (password === "Mohamed@9498#") {
            document.body.style.display = "flex";
            loadFilesFromGitHub(); 
        } else {
            alert("كلمة مرور خاطئة!");
            window.location.href = "index.html"; 
        }

        async function loadFilesFromGitHub() {
            try {
                // قمنا بتثبيت بياناتك هنا مباشرة لحل مشكلة الدومين تماماً
                const username = "temo-qr"; 
                const repoName = "qr-viewer"; 

                const apiUrl = `https://api.github.com/repos/${username}/${repoName}/contents/images`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('فشل في الاتصال بـ GitHub. تأكد من وجود ملفات داخل فولدر images.');
                
                const files = await response.json();
                const select = document.getElementById('fileSelect');
                
                select.innerHTML = '<option value="">-- اختر الملف من هنا --</option>';
                
                let fileCount = 0;
                files.forEach(file => {
                    if (file.type === 'file') {
                        const option = document.createElement('option');
                        option.value = file.name;
                        option.text = file.name;
                        select.appendChild(option);
                        fileCount++;
                    }
                });

                if(fileCount === 0) {
                    throw new Error('فولدر images فارغ! ارفع فيه صور أو ملفات أولاً.');
                }
                
                document.getElementById('loading').
