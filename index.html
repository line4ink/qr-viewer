<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض المستندات</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; overflow-x: hidden; }
        #content { width: 100%; height: 100%; }
        img { width: 100%; height: auto; display: block; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="content"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file'); 
        const contentDiv = document.getElementById('content');

        if (fileName) {
            const relativePath = "images/" + fileName;
            if (fileName.toLowerCase().endsWith('.pdf')) {
                const absoluteUrl = window.location.origin + window.location.pathname.replace('index.html', '') + relativePath;
                contentDiv.innerHTML = `<iframe src="https://docs.google.com/viewer?url=${encodeURIComponent(absoluteUrl)}&embedded=true"></iframe>`;
            } else {
                contentDiv.innerHTML = `<img src="${relativePath}" alt="Document">`;
            }
        } else {
            // لو حد فتح الرابط الأساسي غريب هيشوف صفحة بيضاء تماماً
            contentDiv.innerHTML = ""; 
        }
    </script>
</body>
</html>
